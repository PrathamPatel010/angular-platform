<aside class="flex h-screen w-60 flex-col border-r bg-white">
  <!-- Logo -->
  <div class="flex h-14 items-center border-b px-4">
    <svg
      width="140"
      height="40"
      viewBox="0 0 140 40"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Icon background -->
      <rect width="40" height="40" rx="10" fill="#0ea5e9" />

      <!-- Strong, centered lightning -->
      <path
        d="M21 6
       L13 21
       H20
       L17 34
       L27 16
       H20
       L21 6Z"
        fill="white"
      />

      <!-- Wordmark -->
      <text
        x="52"
        y="26"
        fill="#0f172a"
        style="
          font-family:
            Inter,
            Segoe UI,
            sans-serif;
          font-weight: 700;
          font-size: 20px;
          letter-spacing: -0.3px;
        "
      >
        VoltFlow
      </text>
    </svg>
  </div>

  <!-- Navigation -->
  <div class="flex-1 overflow-y-auto px-2 py-3">
    <p-panelMenu [model]="items" class="w-full border-none p-0">
      <ng-template #item let-item>
        <a
          pRipple
          class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100"
          [routerLink]="item.link"
          routerLinkActive="bg-gray-100 text-cyan-600 font-medium"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i *ngIf="item.icon" [class]="item.icon + ' text-sm text-gray-500'"></i>

          <span>{{ item.label }}</span>

          <span class="flex-1"></span>

          <i
            *ngIf="item.items?.length"
            class="pi text-xs text-gray-400"
            [ngClass]="{
              'pi-chevron-down': item.expanded,
              'pi-chevron-right': !item.expanded,
            }"
          ></i>
        </a>
      </ng-template>
    </p-panelMenu>
  </div>
</aside>
