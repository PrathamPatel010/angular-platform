<div [formGroup]="form">
  <!-- Label -->
  <label *ngIf="label" class="font-medium">
    {{ label }}
    <span *ngIf="required" class="text-red-500">*</span>
  </label>

  <!-- MULTISELECT -->
  <p-multiSelect
    [formControlName]="controlName"
    [options]="options"
    [placeholder]="placeholder"
    display="chip"
    variant="outlined"
    class="w-full"
    [ngClass]="{ 'border-1 border-red-500': showError }"
  ></p-multiSelect>

  <!-- Errors -->
  <small *ngIf="showError" class="block text-red-500">
    <ng-container *ngIf="control?.errors?.['required']"> {{ label }} is required </ng-container>
  </small>
</div>
